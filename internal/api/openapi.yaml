openapi: 3.0.3
info:
  title: Homebase API
  version: 0.1.0
  description: >
    API for Homebase household operations. Most `/api/v1` routes require a valid
    `homebase_session` cookie created by the auth flow.
    API clients may also authenticate with an API token using
    `Authorization: Bearer <token>`. Read-only tokens may only call read
    endpoints.
servers:
  - url: /
tags:
  - name: Health
  - name: Auth
  - name: Dashboard
  - name: Members
  - name: Projects
  - name: Tasks
  - name: Events
  - name: Routines
  - name: Lists
  - name: Contacts
  - name: Assets
  - name: Documents
  - name: Modules
  - name: Integrations

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthz
      security: []
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /openapi.yaml:
    get:
      tags: [Health]
      summary: OpenAPI document
      operationId: openapiYaml
      security: []
      responses:
        "200":
          description: OpenAPI document.
          content:
            application/yaml:
              schema:
                type: string

  /docs/openapi.yaml:
    get:
      tags: [Health]
      summary: OpenAPI document
      operationId: docsOpenapiYaml
      security: []
      responses:
        "200":
          description: OpenAPI document.
          content:
            application/yaml:
              schema:
                type: string

  /auth/oauth/start:
    get:
      tags: [Auth]
      summary: Start OAuth/OIDC login
      operationId: oauthStart
      security: []
      responses:
        "302":
          description: Redirects to the configured OAuth/OIDC provider.

  /auth/oauth/callback:
    get:
      tags: [Auth]
      summary: Complete OAuth/OIDC login
      operationId: oauthCallback
      security: []
      responses:
        "302":
          description: Sets the session cookie and redirects to the web app.
        "400":
          $ref: "#/components/responses/Error"



  /auth/dev-login:
    get:
      tags: [Auth]
      summary: Development login
      operationId: devLogin
      security: []
      responses:
        "302":
          description: Sets a development session cookie when enabled.
        "404":
          $ref: "#/components/responses/Error"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      operationId: logout
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/me:
    get:
      tags: [Dashboard]
      summary: Current user and household
      operationId: getMe
      responses:
        "200":
          description: Current session context.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  household:
                    $ref: "#/components/schemas/Household"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/api-tokens:
    get:
      tags: [Auth]
      summary: List API tokens
      operationId: listApiTokens
      description: Requires a browser session.
      responses:
        "200":
          description: API tokens.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIToken"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags: [Auth]
      summary: Create API token
      operationId: createApiToken
      description: Requires a browser session. The plaintext token is returned only once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APITokenInput"
      responses:
        "201":
          description: Created API token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITokenWithSecret"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/api-tokens/{id}:
    delete:
      tags: [Auth]
      summary: Revoke API token
      operationId: revokeApiToken
      description: Requires a browser session.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/households/current:
    get:
      tags: [Dashboard]
      summary: Current household
      operationId: getCurrentHousehold
      responses:
        "200":
          description: Current household.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/dashboard:
    get:
      tags: [Dashboard]
      summary: Dashboard data
      operationId: getDashboard
      responses:
        "200":
          description: Household dashboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/calendar:
    get:
      tags: [Dashboard]
      summary: Calendar month
      operationId: getCalendar
      parameters:
        - name: month
          in: query
          description: Month to load in `YYYY-MM` format.
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
      responses:
        "200":
          description: Calendar month.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarMonth"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/dashboard/tiles/move:
    post:
      tags: [Dashboard]
      summary: Move a dashboard tile
      operationId: moveDashboardTile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tile, direction]
              properties:
                tile:
                  type: string
                direction:
                  type: string
                  enum: [up, down]
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/dashboard/tiles/order:
    post:
      tags: [Dashboard]
      summary: Replace dashboard tile order
      operationId: setDashboardTileOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tiles]
              properties:
                tiles:
                  type: array
                  items:
                    type: string
                  example: [calendar, tasks, projects, appointments, list]
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/members:
    get:
      tags: [Members]
      summary: List household members
      operationId: listMembers
      responses:
        "200":
          $ref: "#/components/responses/UserList"
    post:
      tags: [Members]
      summary: Add a household member
      operationId: addMember
      requestBody:
        $ref: "#/components/requestBodies/MemberInput"
      responses:
        "201":
          description: Member created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Error"

  /api/v1/members/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Members]
      summary: Update a household member
      operationId: updateMember
      requestBody:
        $ref: "#/components/requestBodies/MemberInput"
      responses:
        "200":
          description: Member updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Members]
      summary: Remove a household member
      operationId: removeMember
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List projects
      operationId: listProjects
      responses:
        "200":
          $ref: "#/components/responses/ProjectList"
    post:
      tags: [Projects]
      summary: Create a project
      operationId: createProject
      requestBody:
        $ref: "#/components/requestBodies/ProjectInput"
      responses:
        "201":
          $ref: "#/components/responses/Project"

  /api/v1/projects/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Projects]
      summary: Get a project
      operationId: getProject
      responses:
        "200":
          $ref: "#/components/responses/Project"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Projects]
      summary: Update a project
      operationId: updateProject
      requestBody:
        $ref: "#/components/requestBodies/ProjectInput"
      responses:
        "200":
          $ref: "#/components/responses/Project"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/projects/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Projects]
      summary: Archive a project
      operationId: archiveProject
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/projects/{id}/folders:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Projects]
      summary: List project folders
      operationId: listProjectFolders
      responses:
        "200":
          $ref: "#/components/responses/ProjectFolderList"
    post:
      tags: [Projects]
      summary: Create a project folder
      operationId: createProjectFolder
      requestBody:
        $ref: "#/components/requestBodies/ProjectFolderInput"
      responses:
        "201":
          $ref: "#/components/responses/ProjectFolder"

  /api/v1/project-folders/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Projects]
      summary: Update a project folder
      operationId: updateProjectFolder
      requestBody:
        $ref: "#/components/requestBodies/ProjectFolderInput"
      responses:
        "200":
          $ref: "#/components/responses/ProjectFolder"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/project-folders/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Projects]
      summary: Archive a project folder
      operationId: archiveProjectFolder
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      operationId: listTasks
      responses:
        "200":
          $ref: "#/components/responses/TaskList"
    post:
      tags: [Tasks]
      summary: Create a task
      operationId: createTask
      requestBody:
        $ref: "#/components/requestBodies/TaskInput"
      responses:
        "201":
          $ref: "#/components/responses/Task"

  /api/v1/tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Tasks]
      summary: Get a task
      operationId: getTask
      responses:
        "200":
          $ref: "#/components/responses/Task"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Tasks]
      summary: Update a task
      operationId: updateTask
      requestBody:
        $ref: "#/components/requestBodies/TaskInput"
      responses:
        "200":
          $ref: "#/components/responses/Task"
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/tasks/{id}/complete:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Tasks]
      summary: Complete a task
      operationId: completeTask
      responses:
        "200":
          $ref: "#/components/responses/Task"

  /api/v1/tasks/{id}/reopen:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Tasks]
      summary: Reopen a task
      operationId: reopenTask
      responses:
        "200":
          $ref: "#/components/responses/Task"

  /api/v1/tasks/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Tasks]
      summary: Archive a task
      operationId: archiveTask
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/events:
    get:
      tags: [Events]
      summary: List appointments/events
      operationId: listEvents
      responses:
        "200":
          $ref: "#/components/responses/EventList"
    post:
      tags: [Events]
      summary: Create an appointment/event
      operationId: createEvent
      requestBody:
        $ref: "#/components/requestBodies/EventInput"
      responses:
        "201":
          $ref: "#/components/responses/Event"

  /api/v1/events/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Events]
      summary: Get an appointment/event
      operationId: getEvent
      responses:
        "200":
          $ref: "#/components/responses/Event"
    patch:
      tags: [Events]
      summary: Update an appointment/event
      operationId: updateEvent
      requestBody:
        $ref: "#/components/requestBodies/EventInput"
      responses:
        "200":
          $ref: "#/components/responses/Event"
    delete:
      tags: [Events]
      summary: Delete an appointment/event
      operationId: deleteEvent
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/routines:
    get:
      tags: [Routines]
      summary: List routines
      operationId: listRoutines
      responses:
        "200":
          $ref: "#/components/responses/RoutineList"
    post:
      tags: [Routines]
      summary: Create a routine
      operationId: createRoutine
      requestBody:
        $ref: "#/components/requestBodies/RoutineInput"
      responses:
        "201":
          $ref: "#/components/responses/Routine"

  /api/v1/routines/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Routines]
      summary: Get a routine
      operationId: getRoutine
      responses:
        "200":
          $ref: "#/components/responses/Routine"
    patch:
      tags: [Routines]
      summary: Update a routine
      operationId: updateRoutine
      requestBody:
        $ref: "#/components/requestBodies/RoutineInput"
      responses:
        "200":
          $ref: "#/components/responses/Routine"

  /api/v1/routines/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Routines]
      summary: Archive a routine
      operationId: archiveRoutine
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/routines/{id}/generate-task:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Routines]
      summary: Generate a task from a routine
      operationId: generateRoutineTask
      responses:
        "201":
          $ref: "#/components/responses/Task"

  /api/v1/lists:
    get:
      tags: [Lists]
      summary: List household lists
      operationId: listHouseholdLists
      responses:
        "200":
          $ref: "#/components/responses/HouseholdListList"
    post:
      tags: [Lists]
      summary: Create a household list
      operationId: createHouseholdList
      requestBody:
        $ref: "#/components/requestBodies/HouseholdListInput"
      responses:
        "201":
          $ref: "#/components/responses/HouseholdList"

  /api/v1/lists/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Lists]
      summary: Get a household list
      operationId: getHouseholdList
      responses:
        "200":
          $ref: "#/components/responses/HouseholdList"
    patch:
      tags: [Lists]
      summary: Update a household list
      operationId: updateHouseholdList
      requestBody:
        $ref: "#/components/requestBodies/HouseholdListInput"
      responses:
        "200":
          $ref: "#/components/responses/HouseholdList"

  /api/v1/lists/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Lists]
      summary: Archive a household list
      operationId: archiveHouseholdList
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/lists/{id}/items:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Lists]
      summary: List items in a household list
      operationId: listListItems
      responses:
        "200":
          $ref: "#/components/responses/ListItemList"
    post:
      tags: [Lists]
      summary: Create a list item
      operationId: createListItem
      requestBody:
        $ref: "#/components/requestBodies/ListItemInput"
      responses:
        "201":
          $ref: "#/components/responses/ListItem"

  /api/v1/list-items/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Lists]
      summary: Update a list item
      operationId: updateListItem
      requestBody:
        $ref: "#/components/requestBodies/ListItemInput"
      responses:
        "200":
          $ref: "#/components/responses/ListItem"

  /api/v1/list-items/{id}/complete:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Lists]
      summary: Complete a list item
      operationId: completeListItem
      responses:
        "200":
          $ref: "#/components/responses/ListItem"

  /api/v1/list-items/{id}/reopen:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Lists]
      summary: Reopen a list item
      operationId: reopenListItem
      responses:
        "200":
          $ref: "#/components/responses/ListItem"

  /api/v1/list-items/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Lists]
      summary: Archive a list item
      operationId: archiveListItem
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/contacts:
    get:
      tags: [Contacts]
      summary: List contacts
      operationId: listContacts
      responses:
        "200":
          $ref: "#/components/responses/ContactList"
    post:
      tags: [Contacts]
      summary: Create a contact
      operationId: createContact
      requestBody:
        $ref: "#/components/requestBodies/ContactInput"
      responses:
        "201":
          $ref: "#/components/responses/Contact"

  /api/v1/contacts/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Contacts]
      summary: Get a contact
      operationId: getContact
      responses:
        "200":
          $ref: "#/components/responses/Contact"
    patch:
      tags: [Contacts]
      summary: Update a contact
      operationId: updateContact
      requestBody:
        $ref: "#/components/requestBodies/ContactInput"
      responses:
        "200":
          $ref: "#/components/responses/Contact"

  /api/v1/contacts/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Contacts]
      summary: Archive a contact
      operationId: archiveContact
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/related-contacts:
    get:
      tags: [Contacts]
      summary: List contacts linked to a project, task, or asset
      operationId: listRelatedContacts
      parameters:
        - $ref: "#/components/parameters/EntityType"
        - $ref: "#/components/parameters/EntityID"
      responses:
        "200":
          $ref: "#/components/responses/RelatedContactList"
    post:
      tags: [Contacts]
      summary: Link a contact to a project, task, or asset
      operationId: linkRelatedContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/RelatedItemInput"
                - type: object
                  required: [contact_id]
                  properties:
                    contact_id:
                      type: integer
                      format: int64
      responses:
        "201":
          $ref: "#/components/responses/Ok"

  /api/v1/contact-links/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    delete:
      tags: [Contacts]
      summary: Remove a contact link
      operationId: unlinkContact
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/assets:
    get:
      tags: [Assets]
      summary: List assets
      operationId: listAssets
      responses:
        "200":
          $ref: "#/components/responses/AssetList"
    post:
      tags: [Assets]
      summary: Create an asset
      operationId: createAsset
      requestBody:
        $ref: "#/components/requestBodies/AssetInput"
      responses:
        "201":
          $ref: "#/components/responses/Asset"

  /api/v1/assets/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Assets]
      summary: Get an asset
      operationId: getAsset
      responses:
        "200":
          $ref: "#/components/responses/Asset"
    patch:
      tags: [Assets]
      summary: Update an asset
      operationId: updateAsset
      requestBody:
        $ref: "#/components/requestBodies/AssetInput"
      responses:
        "200":
          $ref: "#/components/responses/Asset"

  /api/v1/assets/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Assets]
      summary: Archive an asset
      operationId: archiveAsset
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/assets/{id}/maintenance:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Assets]
      summary: List asset maintenance items
      operationId: listAssetMaintenanceItems
      responses:
        "200":
          $ref: "#/components/responses/AssetMaintenanceItemList"
    post:
      tags: [Assets]
      summary: Create an asset maintenance item
      operationId: createAssetMaintenanceItem
      requestBody:
        $ref: "#/components/requestBodies/AssetMaintenanceInput"
      responses:
        "201":
          $ref: "#/components/responses/AssetMaintenanceItem"

  /api/v1/asset-maintenance/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Assets]
      summary: Update an asset maintenance item
      operationId: updateAssetMaintenanceItem
      requestBody:
        $ref: "#/components/requestBodies/AssetMaintenanceInput"
      responses:
        "200":
          $ref: "#/components/responses/AssetMaintenanceItem"

  /api/v1/asset-maintenance/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Assets]
      summary: Archive an asset maintenance item
      operationId: archiveAssetMaintenanceItem
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/asset-maintenance/{id}/generate-task:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Assets]
      summary: Generate a task from an asset maintenance item
      operationId: generateAssetMaintenanceTask
      responses:
        "201":
          $ref: "#/components/responses/Task"

  /api/v1/related-assets:
    get:
      tags: [Assets]
      summary: List assets linked to a project or task
      operationId: listRelatedAssets
      parameters:
        - $ref: "#/components/parameters/EntityType"
        - $ref: "#/components/parameters/EntityID"
      responses:
        "200":
          $ref: "#/components/responses/RelatedAssetList"
    post:
      tags: [Assets]
      summary: Link an asset to a project or task
      operationId: linkRelatedAsset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/RelatedItemInput"
                - type: object
                  required: [asset_id]
                  properties:
                    asset_id:
                      type: integer
                      format: int64
      responses:
        "201":
          $ref: "#/components/responses/Ok"

  /api/v1/asset-links/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    delete:
      tags: [Assets]
      summary: Remove an asset link
      operationId: unlinkAsset
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/documents:
    get:
      tags: [Documents]
      summary: List documents
      operationId: listDocuments
      responses:
        "200":
          $ref: "#/components/responses/DocumentList"
    post:
      tags: [Documents]
      summary: Create a document
      operationId: createDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentUploadInput"
      responses:
        "201":
          $ref: "#/components/responses/Document"

  /api/v1/documents/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Documents]
      summary: Get a document
      operationId: getDocument
      responses:
        "200":
          $ref: "#/components/responses/Document"
    patch:
      tags: [Documents]
      summary: Update a document
      operationId: updateDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentUploadInput"
      responses:
        "200":
          $ref: "#/components/responses/Document"

  /api/v1/documents/{id}/download:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Documents]
      summary: Download or preview an uploaded document file
      operationId: downloadDocument
      responses:
        "200":
          description: Document file stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/documents/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Documents]
      summary: Archive a document
      operationId: archiveDocument
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/documents/{id}/related-items:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Documents]
      summary: List items related to a document
      operationId: listRelatedItemsForDocument
      responses:
        "200":
          $ref: "#/components/responses/RelatedItemList"
    post:
      tags: [Documents]
      summary: Link a document to a project, task, or asset
      operationId: linkRelatedItemToDocument
      requestBody:
        $ref: "#/components/requestBodies/RelatedItemInput"
      responses:
        "201":
          description: Related item link created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelatedItem"

  /api/v1/related-documents:
    get:
      tags: [Documents]
      summary: List documents linked to a project, task, or asset
      operationId: listRelatedDocuments
      parameters:
        - $ref: "#/components/parameters/EntityType"
        - $ref: "#/components/parameters/EntityID"
      responses:
        "200":
          $ref: "#/components/responses/RelatedDocumentList"
    post:
      tags: [Documents]
      summary: Link a document to a project, task, or asset
      operationId: linkRelatedDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/RelatedItemInput"
                - type: object
                  required: [document_id]
                  properties:
                    document_id:
                      type: integer
                      format: int64
      responses:
        "201":
          description: Document link created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelatedItem"

  /api/v1/document-links/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    delete:
      tags: [Documents]
      summary: Remove a document link
      operationId: unlinkDocument
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/v1/modules/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          enum: [routines, lists, contacts, assets, documents]
    get:
      tags: [Modules]
      summary: List module summary items
      operationId: listModule
      responses:
        "200":
          description: Module items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleItem"
        "404":
          $ref: "#/components/responses/Error"



components:
