services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/homebase.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: homebase
      POSTGRES_USER: homebase
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - homebase_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homebase -d homebase"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: somethingamusing/homebase:api-260619-03
    restart: unless-stopped
    environment:
      APP_ENV: production
      API_ADDR: :8081
      WEB_BASE_URL: ${WEB_BASE_URL:?set WEB_BASE_URL}
      API_BASE_URL: ${API_BASE_URL:?set API_BASE_URL}
      DATABASE_URL: postgres://homebase:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/homebase?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-homebase_session}
      BUDGET_APP_URL: ${BUDGET_APP_URL:-}
      OAUTH_PROVIDER_NAME: ${OAUTH_PROVIDER_NAME:-}
      OAUTH_ISSUER_URL: ${OAUTH_ISSUER_URL:-}
      OAUTH_AUTH_URL: ${OAUTH_AUTH_URL:-}
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL:-}
      OAUTH_USERINFO_URL: ${OAUTH_USERINFO_URL:-}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:-}
      OAUTH_SCOPES: ${OAUTH_SCOPES:-openid profile email}
      BOOTSTRAP_OWNER_EMAIL: ${BOOTSTRAP_OWNER_EMAIL:-}
      BOOTSTRAP_OWNER_NAME: ${BOOTSTRAP_OWNER_NAME:-}
      BOOTSTRAP_HOUSEHOLD_NAME: ${BOOTSTRAP_HOUSEHOLD_NAME:-My Household}
      ROUTINE_CHECK_INTERVAL_SECONDS: ${ROUTINE_CHECK_INTERVAL_SECONDS:-900}
      DOCUMENT_UPLOAD_DIR: /var/lib/homebase/uploads
      DOCUMENT_MAX_UPLOAD_MB: ${DOCUMENT_MAX_UPLOAD_MB:-25}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - homebase_uploads:/var/lib/homebase/uploads

  web:
    image: somethingamusing/homebase:web-260619-04
    restart: unless-stopped
    environment:
      APP_ENV: production
      WEB_ADDR: :8080
      WEB_BASE_URL: ${WEB_BASE_URL:?set WEB_BASE_URL}
      API_BASE_URL: ${API_BASE_URL:?set API_BASE_URL}
      API_INTERNAL_URL: http://api:8081
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-homebase_session}
    depends_on:
      - api

volumes:
  homebase_pgdata:
  homebase_uploads:
