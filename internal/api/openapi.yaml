              $ref: "#/components/schemas/RelatedAsset"
    Document:
      description: Document.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Document"
    DocumentList:
      description: Documents.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Document"
    RelatedDocumentList:
      description: Related documents.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/RelatedDocument"
    RelatedItemList:
      description: Related items.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/RelatedItem"

  schemas:
    Ok:
      type: object
      properties:
        ok:
          type: boolean
          example: true
    Error:
      type: object
      properties:
        error:
          type: string
    Timestamp:
      type: string
      format: date-time
      example: "2026-06-13T12:00:00Z"
    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string, format: email }
        name: { type: string }
        avatar_url: { type: string }
        role: { type: string }
        created_at: { $ref: "#/components/schemas/Timestamp" }
    Household:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        role: { type: string }
        created_at: { $ref: "#/components/schemas/Timestamp" }
    ProjectInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        status: { type: string, example: active }
        priority: { type: string, example: normal }
        due_date: { $ref: "#/components/schemas/Timestamp" }
    Project:
      allOf:
        - $ref: "#/components/schemas/ProjectInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
    ProjectFolderInput:
      type: object
      properties:
        title: { type: string }
        sort_order: { type: integer }
    ProjectFolder:
      allOf:
        - $ref: "#/components/schemas/ProjectFolderInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
            project_id: { type: integer, format: int64 }
            status: { type: string }
    TaskInput:
      type: object
      properties:
        project_id: { type: integer, format: int64, nullable: true }
        project_folder_id: { type: integer, format: int64, nullable: true }
        routine_id: { type: integer, format: int64, nullable: true }
        asset_id: { type: integer, format: int64, nullable: true }
        asset_maintenance_item_id: { type: integer, format: int64, nullable: true }
        assigned_to: { type: integer, format: int64, nullable: true }
        title: { type: string }
        notes: { type: string }
        status: { type: string, example: open }
        priority: { type: string, example: normal }
        due_at: { $ref: "#/components/schemas/Timestamp" }
    Task:
      allOf:
        - $ref: "#/components/schemas/TaskInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
            assigned_name: { type: string }
            completed_at: { $ref: "#/components/schemas/Timestamp" }
    EventInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        starts_at: { $ref: "#/components/schemas/Timestamp" }
        ends_at: { $ref: "#/components/schemas/Timestamp" }
        location: { type: string }
    Event:
      allOf:
        - $ref: "#/components/schemas/EventInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
            source: { type: string }
            external_id: { type: string }
            sync_status: { type: string }
    RoutineInput:
      type: object
      properties:
        assigned_to: { type: integer, format: int64, nullable: true }
        title: { type: string }
        notes: { type: string }
        cadence: { type: string, example: monthly }
        status: { type: string, example: active }
        next_due_at: { $ref: "#/components/schemas/Timestamp" }
    Routine:
      allOf:
        - $ref: "#/components/schemas/RoutineInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
            assigned_name: { type: string }
            last_completed_at: { $ref: "#/components/schemas/Timestamp" }
    HouseholdListInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        kind: { type: string }
        status: { type: string, example: active }
    HouseholdList:
      allOf:
        - $ref: "#/components/schemas/HouseholdListInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
    ListItemInput:
      type: object
      properties:
        assigned_to: { type: integer, format: int64, nullable: true }
        title: { type: string }
        notes: { type: string }
        status: { type: string, example: open }
        due_at: { $ref: "#/components/schemas/Timestamp" }
    ListItem:
      allOf:
        - $ref: "#/components/schemas/ListItemInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
            list_id: { type: integer, format: int64 }
            assigned_name: { type: string }
            completed_at: { $ref: "#/components/schemas/Timestamp" }
    ContactInput:
      type: object
      properties:
        name: { type: string }
        kind: { type: string }
        email: { type: string }
        phone: { type: string }
        notes: { type: string }
        status: { type: string, example: active }
    Contact:
      allOf:
        - $ref: "#/components/schemas/ContactInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
    AssetInput:
      type: object
      properties:
        name: { type: string }
        kind: { type: string }
        serial_number: { type: string }
        warranty_expires_at: { $ref: "#/components/schemas/Timestamp" }
        purchase_date: { $ref: "#/components/schemas/Timestamp" }
        purchase_cost: { type: number, format: double, nullable: true }
        vendor: { type: string }
        model: { type: string }
        maintenance_cadence: { type: string }
        maintenance_next_due_at: { $ref: "#/components/schemas/Timestamp" }
        notes: { type: string }
        status: { type: string, example: active }
    Asset:
      allOf:
        - $ref: "#/components/schemas/AssetInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
            maintenance_last_completed_at: { $ref: "#/components/schemas/Timestamp" }
    AssetMaintenanceInput:
      type: object
      properties:
        title: { type: string }
        notes: { type: string }
        cadence: { type: string, example: monthly }
        status: { type: string, example: active }
        next_due_at: { $ref: "#/components/schemas/Timestamp" }
    AssetMaintenanceItem:
      allOf:
        - $ref: "#/components/schemas/AssetMaintenanceInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
            asset_id: { type: integer, format: int64 }
            last_completed_at: { $ref: "#/components/schemas/Timestamp" }
    DocumentInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        url: { type: string }
        kind: { type: string }
        status: { type: string, example: active }
        file_name: { type: string }
        content_type: { type: string }
        file_size: { type: integer, format: int64 }
    DocumentUploadInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        url: { type: string }
        kind: { type: string }
        status: { type: string }
        file:
          type: string
          format: binary
    Document:
      allOf:
        - $ref: "#/components/schemas/DocumentInput"
        - $ref: "#/components/schemas/AuditFields"
        - type: object
          properties:
            id: { type: integer, format: int64 }
            household_id: { type: integer, format: int64 }
    RelatedItemInput:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type:
          type: string
          enum: [project, task, asset]
        entity_id:
          type: integer
          format: int64
    RelatedItem:
      type: object
      properties:
        link_id: { type: integer, format: int64 }
        type: { type: string }
        id: { type: integer, format: int64 }
        title: { type: string }
        subtitle: { type: string }
        url: { type: string }
        created_at: { $ref: "#/components/schemas/Timestamp" }
    RelatedDocument:
      type: object
      properties:
        link_id: { type: integer, format: int64 }
        document:
          $ref: "#/components/schemas/Document"
    RelatedContact:
      type: object
      properties:
        link_id: { type: integer, format: int64 }
        contact:
          $ref: "#/components/schemas/Contact"
    RelatedAsset:
      type: object
      properties:
        link_id: { type: integer, format: int64 }
        asset:
          $ref: "#/components/schemas/Asset"
    MemberInput:
      type: object
      properties:
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, example: member }
    APIToken:
      type: object
      properties:
        id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        household_id: { type: integer, format: int64 }
        name: { type: string }
        prefix: { type: string }
        scope:
          type: string
          enum: [read, write]
        last_used_at: { $ref: "#/components/schemas/Timestamp" }
        revoked_at: { $ref: "#/components/schemas/Timestamp" }
        created_at: { $ref: "#/components/schemas/Timestamp" }
    APITokenWithSecret:
      allOf:
        - $ref: "#/components/schemas/APIToken"
        - type: object
          properties:
            token: { type: string }
    APITokenInput:
      type: object
      properties:
        name: { type: string }
        scope:
          type: string
          enum: [read, write]
    ModuleItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        name: { type: string }
        kind: { type: string }
        cadence: { type: string }
        next_due_at: { $ref: "#/components/schemas/Timestamp" }
        created_at: { $ref: "#/components/schemas/Timestamp" }
    DashboardTile:
      type: object
      properties:
        key: { type: string }
        name: { type: string }
    RoutineNotice:
      type: object
      properties:
        routine:
          $ref: "#/components/schemas/Routine"
        kind: { type: string }
        message: { type: string }
    Dashboard:
      type: object
      properties:
        household:
          $ref: "#/components/schemas/Household"
        current_user:
          $ref: "#/components/schemas/User"
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        routines:
          type: array
          items:
            $ref: "#/components/schemas/Routine"
        notices:
          type: array
          items:
            $ref: "#/components/schemas/RoutineNotice"
        tile_order:
          type: array
          items:
            type: string
        available_tiles:
          type: array
          items:
            $ref: "#/components/schemas/DashboardTile"
        budget_app_url:
          type: string
    CalendarEntry:
      type: object
      properties:
        type: { type: string }
        id: { type: integer, format: int64 }
        title: { type: string }
        url: { type: string }
        time: { $ref: "#/components/schemas/Timestamp" }
        meta: { type: string }
        status: { type: string }
        priority: { type: string }
    CalendarDay:
      type: object
      properties:
        date: { $ref: "#/components/schemas/Timestamp" }
        in_month: { type: boolean }
        is_today: { type: boolean }
        entries:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEntry"
    CalendarMonth:
      type: object
      properties:
        month: { $ref: "#/components/schemas/Timestamp" }
        prev_month: { type: string }
        next_month: { type: string }
        days:
          type: array
          items:
            $ref: "#/components/schemas/CalendarDay"
    AuditFields:
