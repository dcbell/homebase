        application/json:
          schema:
            $ref: "#/components/schemas/Project"
    ProjectList:
      description: Projects.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Project"
    ProjectFolder:
      description: Project folder.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProjectFolder"
    ProjectFolderList:
      description: Project folders.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ProjectFolder"
    Task:
      description: Task.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Task"
    TaskList:
      description: Tasks.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Task"
    Event:
      description: Event.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Event"
    EventList:
      description: Events.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Event"
    Routine:
      description: Routine.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Routine"
    RoutineList:
      description: Routines.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Routine"
    HouseholdList:
